<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday Sadia</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif}
canvas{position:fixed;inset:0}
.center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;pointer-events:none}
.heart{font-size:180px;filter:drop-shadow(0 0 25px hotpink);animation:pulse 1.6s infinite}
h1{margin-top:-120px;color:#fff;text-shadow:0 0 15px hotpink;font-size:clamp(28px,5vw,56px)}
p{color:#ffd6ea}
@keyframes pulse{50%{transform:scale(1.08)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="center">
<div class="heart">💖</div>
<h1>Happy Birthday Sadia</h1>
<p>Wishing you joy, love & happiness!</p>
</div>
<script>
const c=document.getElementById("c"),x=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
let pts=[...Array(180)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:1+Math.random()*3,v:(.5+Math.random())}));
(function a(){
x.fillStyle="rgba(0,0,0,.2)";x.fillRect(0,0,c.width,c.height);
for(const p of pts){
x.beginPath();x.fillStyle="rgba(255,105,180,.9)";
x.arc(p.x,p.y,p.r,0,6.28);x.fill();
p.y-=p.v;p.x+=Math.sin(p.y/40)*.5;
if(p.y<0){p.y=c.height+10;p.x=Math.random()*c.width;}
}
requestAnimationFrame(a);
})();
</script>
</body></html>
